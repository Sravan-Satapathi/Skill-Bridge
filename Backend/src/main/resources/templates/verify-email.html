<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Email Verification - Skill-Bridge</title>
</head>
<body style="font-family: Arial, sans-serif; background-color: #f4f6f9; padding: 20px;">
<div style="max-width: 600px; margin: auto; background-color: #ffffff; padding: 30px; border-radius: 10px; border: 1px solid #e0e0e0;">
    <h2 style="color: #2563eb;">Skill-Bridge - Verify Your Email</h2>

    <p style="font-size: 16px; color: #333;">Hello,</p>

    <p style="font-size: 15px; color: #444;">
        We received an email verification request for your account:
        <br>
        <a th:href="'mailto:' + ${email}" th:text="${email}" style="color: #2563eb; text-decoration: none;">example@email.com</a>
    </p>

    <p style="font-size: 15px; color: #444;"><strong>Use the OTP below to verify your account:</strong></p>

    <div style="background-color: #2563eb; color: white; font-size: 22px; padding: 15px 25px; border-radius: 8px; text-align: center; letter-spacing: 4px; margin: 20px auto; width: fit-content;" th:text="${otp}">
        123456
    </div>

    <p style="font-size: 15px; color: #444;">This OTP is valid for the next <strong>24 hours</strong>.</p>

    <hr style="margin: 30px 0;">
    <p style="font-size: 12px; color: #888; text-align: center;">
        If you didn't request this email verification, please ignore this email.
    </p>
</div>
</body>
</html>
